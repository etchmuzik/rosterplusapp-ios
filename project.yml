# XcodeGen spec for RostrPlus iOS.
#
# Run `xcodegen generate` in the repo root to (re)produce RostrPlus.xcodeproj.
# No manual Xcode project edits — everything lives here + Config/*.xcconfig.
#
# Install XcodeGen once:
#   brew install xcodegen
#
# See https://github.com/yonaskolb/XcodeGen/blob/master/Docs/ProjectSpec.md

name: RostrPlus

options:
  bundleIdPrefix: io.rosterplus
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "18.0"
  # Generate fresh on each run so stale in-memory state doesn't leak
  # between generations.
  generateEmptyDirectories: false

# ─── Configurations ───────────────────────────────────────
# Mirrors the existing Config/*.xcconfig files. XcodeGen applies
# the file-level settings on top of every target automatically.
configs:
  Debug: debug
  Release: release

configFiles:
  Debug: Config/Debug.xcconfig
  Release: Config/Release.xcconfig

# ─── Packages ─────────────────────────────────────────────
# The feature code lives in the sibling SPM package.
packages:
  RostrPlusPackage:
    path: RostrPlusPackage

# ─── Targets ──────────────────────────────────────────────
targets:

  # App target — thin shell that hands off to RostrPlusFeature.
  RostrPlus:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: RostrPlus
    dependencies:
      - package: RostrPlusPackage
        product: RostrPlusFeature
      - package: RostrPlusPackage
        product: DesignSystem
    configFiles:
      Debug: Config/Shared.xcconfig
      Release: Config/Shared.xcconfig
    settings:
      base:
        # The Info.plist is auto-generated from INFOPLIST_KEY_* entries
        # in Shared.xcconfig — no plist file to maintain.
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_ENTITLEMENTS: Config/RostrPlus.entitlements
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    scheme:
      # Wire the UITests bundle in so `xcodebuild test -scheme RostrPlus`
      # actually runs RostrPlusUITests. Without this the scheme is
      # build-only and xcodebuild fails with
      # "Scheme RostrPlus is not currently configured for the test action."
      testTargets:
        - RostrPlusUITests
      gatherCoverageData: false
      commandLineArguments: {}
      environmentVariables: []

  # UI automation tests live alongside the app. UI tests run in their
  # own process and talk to the host via XCUIApplication's IPC, so
  # they do NOT need TEST_TARGET_NAME (which is for unit-test bundles
  # that link against the host module). Setting it on a UI-testing
  # target makes Xcode try to rebuild the host's Swift module from
  # both the host target AND the test target, which collides at
  # `.../RostrPlus.swiftmodule/arm64-apple-ios-simulator.swiftmodule`
  # and the build dies with "Multiple commands produce" errors.
  RostrPlusUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: RostrPlusUITests
    dependencies:
      - target: RostrPlus
    configFiles:
      Debug: Config/Tests.xcconfig
      Release: Config/Tests.xcconfig
