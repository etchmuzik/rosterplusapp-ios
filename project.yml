# XcodeGen spec for RostrPlus iOS.
#
# Run `xcodegen generate` in the repo root to (re)produce RostrPlus.xcodeproj.
# No manual Xcode project edits — everything lives here + Config/*.xcconfig.
#
# Install XcodeGen once:
#   brew install xcodegen
#
# See https://github.com/yonaskolb/XcodeGen/blob/master/Docs/ProjectSpec.md

name: RostrPlus

options:
  bundleIdPrefix: io.rosterplus
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "17.0"
  # Generate fresh on each run so stale in-memory state doesn't leak
  # between generations.
  generateEmptyDirectories: false

# ─── Configurations ───────────────────────────────────────
# Mirrors the existing Config/*.xcconfig files. XcodeGen applies
# the file-level settings on top of every target automatically.
configs:
  Debug: debug
  Release: release

configFiles:
  Debug: Config/Debug.xcconfig
  Release: Config/Release.xcconfig

# ─── Packages ─────────────────────────────────────────────
# The feature code lives in the sibling SPM package.
packages:
  RostrPlusPackage:
    path: RostrPlusPackage

# ─── Targets ──────────────────────────────────────────────
targets:

  # App target — thin shell that hands off to RostrPlusFeature.
  RostrPlus:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: RostrPlus
    dependencies:
      - package: RostrPlusPackage
        product: RostrPlusFeature
      - package: RostrPlusPackage
        product: DesignSystem
    configFiles:
      Debug: Config/Shared.xcconfig
      Release: Config/Shared.xcconfig
    settings:
      base:
        # The Info.plist is auto-generated from INFOPLIST_KEY_* entries
        # in Shared.xcconfig — no plist file to maintain.
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_ENTITLEMENTS: Config/RostrPlus.entitlements
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    scheme:
      testTargets: []
      gatherCoverageData: false
      commandLineArguments: {}
      environmentVariables: []

  # UI automation tests live alongside the app.
  RostrPlusUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: RostrPlusUITests
    dependencies:
      - target: RostrPlus
    configFiles:
      Debug: Config/Tests.xcconfig
      Release: Config/Tests.xcconfig
    settings:
      base:
        TEST_TARGET_NAME: RostrPlus
